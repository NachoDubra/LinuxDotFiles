# ==========================================
# FUENTES Y TIPOGRAFÍA
# ==========================================
font_family      CaskaydiaCove Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 11.5

# Forzar el uso de ligaduras tipográficas (ej. ->, !=, ==)
disable_ligatures never

# ==========================================
# DISEÑO Y APARIENCIA (VENTANA Y BORDES)
# ==========================================
window_padding_width 12
remember_window_size  no
initial_window_width  950
initial_window_height 600
background_opacity 0.80

# Ocultar la barra de título clásica (se ve más moderno)
hide_window_decorations yes
confirm_os_window_close 0

# ==========================================
# CONFIGURACIÓN DE PESTAÑAS (TABS)
# ==========================================
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# ====================================================================
# COLORES ESTILO GRAPHITE-BLUE (PASTEL / ALTO CONTRASTE)
# ====================================================================

# El fondo: Un gris grafito oscuro y elegante
background            #242933
# El texto normal: Blanco nieve pastel (muy legible, no lastima los ojos)
foreground            #E5E9F0

# Cursor y selección (Azul Graphite característico)
cursor                #81A1C1
selection_background  #3B4252
selection_foreground  #E5E9F0

# La paleta de colores de la terminal (Normales y Brillantes)

# Negro / Grafito oscuro (para texto oculto o sombras)
color0                #2E3440
color8                #4C566A

# Rojo Pastel (Un rosa viejo/terracota suave para errores o strings)
color1                #D08770
color9                #EBCB8B

# Verde Pastel (Un verde menta/claro muy limpio)
color2                #A3BE8C
color10               #B48EAD

# Amarillo Pastel (Tono vainilla/crema, excelente para resaltar)
color3                #EBCB8B
color11               #ECEFF4

# Azul Graphite principal (Azul ártico / pastel)
color4                #81A1C1
color12               #8FBCBB

# Magenta / Fucsia Pastel (Tono lavanda suave)
color5                #B48EAD
color13               #D08770

# Cian Pastel (Celeste agua/hielo, súper relajante para la vista)
color6                #8FBCBB
color14               #81A1C1

# Blanco (Gris claro pastel y Blanco puro brillante)
color7                #D8DEE9
color15               #FFFFFF

# URL bajo el cursor (Cian pastel)
url_color             #8FBCBB

# ==========================================
# RENDIMIENTO Y AVANZADO
# ==========================================
repaint_delay 10
input_delay 3
sync_to_monitor yes
detect_urls yes
enable_audio_bell no

# ==========================================
# ATAJOS DE TECLADO (SHORTCUTS)
# ==========================================
# Gestionar pestañas
map ctrl+t new_tab
map ctrl+w close_tab
map ctrl+k next_tab
map ctrl+j previous_tab

# Gestionar ventanas (paneles) dentro de una pestaña
map ctrl+enter new_window
map ctrl+shift+k next_window
map ctrl+shift+j previous_window

# Cambiar tamaño de fuente rápidamente
map ctrl+shift+equal change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

# Portapapeles
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
